services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.16.6
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.enrollment.enabled=false
      - ES_JAVA_OPTS=-Xms1g -Xmx1g  # 明确设置 JVM 堆内存（关键修复！）
      - _JAVA_OPTIONS=-XX:UseSVE=0

    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - ./data:/usr/share/elasticsearch/data  # 必须挂载数据卷
    ports:
      - "9200:9200"
    networks:
      - local_net

  kibana:
    image: docker.elastic.co/kibana/kibana:8.16.6
    container_name: kibana
    ports:
      - "5601:5601"
    networks:
      - local_net  # 添加 Kibana 到同一网络
    depends_on:
      - elasticsearch  # 确保 Elasticsearch 先启动

networks:
  local_net:
    external: true
