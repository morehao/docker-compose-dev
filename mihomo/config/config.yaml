mixed-port: 7890
allow-lan: false
bind-address: "127.0.0.1"
mode: rule
log-level: info
ipv6: true
external-controller: 127.0.0.1:9093

proxy-providers:
  mySub:
    type: file
    path: ./proxies.yaml
    health-check:
      enable: true
      interval: 600
      url: http://www.gstatic.com/generate_204

proxy-groups:
  - name: PROXY
    type: select
    use:
      - mySub

rules:
  - MATCH,PROXY